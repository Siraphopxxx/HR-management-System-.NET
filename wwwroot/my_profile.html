<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css"> <style>
        main { max-width: 900px; margin: auto; }
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 1.5rem;
            border-radius: 8px;
        }
        .profile-grid div {
            display: flex;
            flex-direction: column;
        }
        .profile-grid label {
            font-weight: bold;
            color: #555;
            margin-bottom: 0.5rem;
        }
        .profile-grid input[type="text"],
        .profile-grid input[type="email"],
        .profile-grid input[type="date"] {
            padding: 0.5rem;
            border: 1px solid #ced4da;
            border-radius: 4px;
            background-color: #e9ecef; /* (สีเทา = อ่านอย่างเดียว) */
            font-family: inherit;
            font-size: 1rem;
        }
        .full-width {
            grid-column: 1 / -1; /* (ให้ช่องยาวเต็ม) */
        }
    </style>
</head>
<body>
    <div id="app" class="role-page employee-page"> 
        <header>
            <h1>My Profile</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>
        <main>
            <a href="employee.html" class="back-link">&larr; Back to Dashboard</a>

            <div id="profileContainer">
                <p>Loading profile data...</p>
            </div>

        </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        // --- โค้ดสำหรับหน้านี้โดยเฉพาะ ---
        
        // (Helper: แปลง Date string (2023-10-31T00:00:00) เป็น (2023-10-31))
        function formatDateForInput(dateString) {
            if (!dateString) return '';
            try {
                const date = new Date(dateString);
                return date.toISOString().split('T')[0];
            } catch (e) {
                return '';
            }
        }

        async function loadMyProfile(employeeId) {
            const container = document.getElementById('profileContainer');
            if (!container) return;

            try {
                // (เรียก API ใหม่ที่เราสร้าง: /api/profile/{id})
                const response = await fetch(`${API_BASE_URL}/profile/${employeeId}`, { method: 'GET' });
                
                if (!response.ok) {
                    throw new Error(`Failed to fetch profile: ${response.status}`);
                }
                
                const profile = await response.json();
                
                // (สร้างฟอร์ม Read-Only)
                container.innerHTML = `
                    <div class="profile-grid">
                        
                        <div style="background-color: #fff; padding: 1rem; border-radius: 8px;">
                            <label>Employee Number:</label>
                            <input type="text" value="${profile.employeeNumber || ''}" readonly>
                        </div>
                        <div style="background-color: #fff; padding: 1rem; border-radius: 8px;">
                            <label>Username (Login):</label>
                            <input type="text" value="${profile.username || ''}" readonly>
                        </div>
                        <div>
                            <label>First Name:</label>
                            <input type="text" value="${profile.firstName || ''}" readonly>
                        </div>
                        <div>
                            <label>Last Name:</label>
                            <input type="text" value="${profile.lastName || ''}" readonly>
                        </div>
                        <div>
                            <label>Department:</label>
                            <input type="text" value="${profile.departmentName || 'N/A'}" readonly>
                        </div>
                        <div>
                            <label>Job Title:</label>
                            <input type="text" value="${profile.jobTitleName || 'N/A'}" readonly>
                        </div>
                        <div>
                            <label>Manager:</label>
                            <input type="text" value="${profile.managerName || 'N/A'}" readonly>
                        </div>
                        <div>
                            <label>Role:</label>
                            <input type="text" value="${profile.role || 'N/A'}" readonly>
                        </div>

                        <hr class="full-width">

                        <div>
                            <label>Email:</label>
                            <input type="email" value="${profile.email || ''}" readonly>
                        </div>
                        <div>
                            <label>Phone Number:</label>
                            <input type="text" value="${profile.phoneNumber || ''}" readonly>
                        </div>
                        <div>
                            <label>Date of Birth:</label>
                            <input type="date" value="${formatDateForInput(profile.dateOfBirth)}" readonly>
                        </div>
                        <div>
                            <label>Gender:</label>
                            <input type="text" value="${profile.gender || ''}" readonly>
                        </div>

                        <div class="full-width">
                            <label>Address:</label>
                            <input type="text" value="${profile.address_Street || ''}" readonly>
                        </div>
                        <div>
                            <label>City:</label>
                            <input type="text" value="${profile.address_City || ''}" readonly>
                        </div>
                        <div>
                            <label>State:</label>
                            <input type="text" value="${profile.address_State || ''}" readonly>
                        </div>
                         <div>
                            <label>Postal Code:</label>
                            <input type="text" value="${profile.address_PostalCode || ''}" readonly>
                        </div>
                        <div>
                            <label>Country:</label>
                            <input type="text" value="${profile.address_Country || ''}" readonly>
                        </div>
                         <div>
                            <label>Salary (Current):</label>
                            <input type="text" value="${profile.currentSalary ? profile.currentSalary.toLocaleString() : 'N/A'}" readonly>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Load Profile Error:', error);
                container.innerHTML = '<p style="color: red;">Error loading your profile data.</p>';
            }
        }

        // --- รันเมื่อหน้าเว็บโหลด ---
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = checkAuthAndLoadUserInfo(); 
            // (เราต้องใช้ EmployeeId ที่เก็บไว้ใน LocalStorage)
            if (currentUser && currentUser.employeeId) {
                loadMyProfile(currentUser.employeeId);
            } else {
                 document.getElementById('profileContainer').innerHTML = 
                    '<p style="color: red;">Error: Could not find your Employee ID. Please log in again.</p>';
            }
        });
    </script>
</body>
</html>
