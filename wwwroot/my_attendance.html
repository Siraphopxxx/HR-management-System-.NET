<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css"> </head>
<body>
    <div id="app" class="role-page employee-page"> 
        <header>
            <h1>My Attendance History</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>
        <main>
            <a href="employee.html" class="back-link">&larr; Back to Dashboard</a>

            <h2>My Timesheet (Last 90 days)</h2>
            <div class="function-placeholder" style="padding: 0; border: none; background: none;">
                <table id="listTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="listTbody">
                        <tr><td colspan="4">Loading history...</td></tr>
                    </tbody>
                </table>
                <div id="listMessage" class="message"></div>
            </div>

        </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        // --- โค้ดสำหรับหน้านี้โดยเฉพาะ ---

        // (Helper function: แปลง Date string)
        function formatLocalDate(dateString) {
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('th-TH', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    timeZone: 'Asia/Bangkok'
                });
            } catch (e) { return dateString; }
        }
        
        // (Helper function: แปลง Time string)
        function formatLocalTime(timeString) {
            // (timeString มาในรูปแบบ "HH:mm:ss")
            if (!timeString) {
                return 'N/A';
            }
            // (ตัด :ss วินาทีทิ้ง)
            return timeString.substring(0, 5); 
        }

        // 1. ฟังก์ชันโหลด "ประวัติการตอกบัตร" (ของฉัน)
        async function loadMyAttendance(employeeId) {
            if (!employeeId) return;
            
            const tbody = document.getElementById('listTbody');
            const messageDiv = document.getElementById('listMessage');
            if (!tbody || !messageDiv) return;

            tbody.innerHTML = '<tr><td colspan="4">Loading history...</td></tr>';
            showMessage('listMessage', '');

            try {
                // (เรียก API ใหม่ที่เราสร้าง: "api/attendance/{employeeId}")
                const response = await fetch(`${API_BASE_URL}/attendance/${employeeId}`, { method: 'GET' });
                if (!response.ok) throw new Error(`Failed to fetch history: ${response.status}`);

                const history = await response.json();
                tbody.innerHTML = ''; 

                if (history.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No attendance history found.</td></tr>';
                    return;
                }

                history.forEach(att => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${formatLocalDate(att.date)}</td>
                        <td>${formatLocalTime(att.checkIn)}</td>
                        <td>${formatLocalTime(att.checkOut)}</td>
                        <td>${att.status}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error('Load Attendance Error:', error);
                showMessage('listMessage', error.message);
                tbody.innerHTML = `<tr><td colspan="4" style="color: red;">Error loading history.</td></tr>`;
            }
        }

        // --- รันฟังก์ชันเมื่อหน้าเว็บโหลด ---
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = checkAuthAndLoadUserInfo();
            if (currentUser) {
                // (เรียกฟังก์ชันโหลดประวัติ)
                loadMyAttendance(currentUser.employeeId); 
            }
        });
    </script>
</body>
</html>
