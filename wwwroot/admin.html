<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
    <div id="app" class="role-page admin-page">
        <header>
            <h1>Admin Dashboard</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>
        <main>
            
            <div class="stat-container" id="statContainer">
                <div class="stat-box"><h4>Total Employees</h4><p id="statEmployees">...</p></div>
                <div class="stat-box"><h4>Total Users</h4><p id="statUsers">...</p></div>
                <div class="stat-box"><h4>Total Departments</h4><p id="statDepts">...</p></div>
                <div class="stat-box"><h4>Total Job Titles</h4><p id="statJobs">...</p></div>
            </div>

            <h2>Admin Functions</h2>
            <div class="function-placeholder" id="quickLinks">
                <button onclick="window.location.href='manage_users.html'">Manage Users</button>
                <button onclick="window.location.href='manage_departments.html'">Manage Departments</button>
                <button onclick="window.location.href='manage_jobtitles.html'">Manage Job Titles</button>
                
                <button onclick="window.location.href='manage_leavetypes.html'" style="background-color: #ffc107; color: #333;">Manage Leave Types</button>
                <button onclick="window.location.href='manage_leavequotas.html'" style="background-color: #ffc107; color: #333;">Manage Leave Quotas</button>
                <button onclick="window.location.href='manage_publicholidays.html'" style="background-color: #ffc107; color: #333;">Manage Public Holidays</button>
                
                <button onclick="window.location.href='manage_announcements.html'" style="background-color: #17a2b8; color: white;">Manage Announcements</button>
                
                <button onclick="window.location.href='manage_projects.html'" style="background-color: #6f42c1; color: white;">Manage Projects</button>
            </div>
        </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        // (JavaScript ของ admin.html - เหมือนเดิม)
        async function loadDashboardStats() {
            // ... (โค้ด load stats เหมือนเดิม) ...
            const API_BASE_URL = 'http://localhost:5173/api'; 
            const statEmp = document.getElementById('statEmployees');
            const statUsr = document.getElementById('statUsers');
            const statDept = document.getElementById('statDepts');
            const statJob = document.getElementById('statJobs');
            const statContainer = document.getElementById('statContainer');
            if (!statContainer) return;
            try {
                const response = await fetch(`${API_BASE_URL}/Dashboard/stats`, { method: 'GET' });
                if (!response.ok) throw new Error(`Failed to fetch stats: ${response.status}`);
                const stats = await response.json();
                if (statEmp) statEmp.textContent = stats.employeeCount;
                if (statUsr) statUsr.textContent = stats.userCount;
                if (statDept) statDept.textContent = stats.departmentCount;
                if (statJob) statJob.textContent = stats.jobTitleCount;
            } catch (error) {
                console.error("Error loading dashboard stats:", error);
                if(statContainer) statContainer.innerHTML = "<p style='color: red;'>Could not load dashboard stats.</p>";
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = checkAuthAndLoadUserInfo(); 
            if (currentUser) {
                if (currentUser.role === 'Admin') {
                    loadDashboardStats(); 
                } else {
                    alert("Access Denied.");
                    window.location.href = 'index.html';
                }
            }
        });
    </script>
</body>
</html>
