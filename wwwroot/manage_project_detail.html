<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Project Detail</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css"> 
    <style>
        .project-info {
            background-color: #eef;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        .project-info h2 { margin-top: 0; }
        .project-info p { margin: 0.5rem 0; }
        .management-container {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 2rem;
        }
        @media (min-width: 1000px) {
             .management-container {
                grid-template-columns: 40% 60%; 
            }
        }
    </style>
</head>
<body>
    <div id="app" class.role-page admin-page> 
        <header>
            <h1>Manage Project Detail</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>
        <main>
            <a href="#" id="backLink" class="back-link">&larr; Back to Dashboard</a>

            <div id="projectInfoContainer" class="project-info">
                <p>Loading project info...</p>
            </div>

            <hr style="margin: 2rem 0;">

            <div class="management-container">
                
                <div id="teamManagement">
                    <h2>Manage Team Members</h2>
                    <div id="addSection" class="function-placeholder" style="background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 1.5rem; width: 100%; box-sizing: border-box; text-align: left;">
                        <h3>Add Member to Team</h3>
                        <form id="addForm" style="display: flex; gap: 1rem; align-items: flex-end;">
                            <div style="flex: 1;">
                                <label for="newMember">Select Employee:</label>
                                <select id="newMember" required style="width: 100%; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                                    <option value="">-- Loading Employees --</option>
                                </select>
                            </div>
                            <button type="submit" style="padding: 0.6rem 1.2rem; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">Add</button>
                        </form>
                        <div id="addMessage" class="message"></div>
                    </div>

                    <div class="function-placeholder" style="padding: 0; border: none; background: none; margin-top: 1rem;">
                        <table id="listTable">
                            <thead>
                                <tr>
                                    <th>Full Name</th>
                                    <th>Job Title</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="listTbody">
                                </tbody>
                        </table>
                        <div id="listMessage" class="message"></div>
                    </div>
                </div>
                
                <div id="taskManagement">
                    <h2>Manage Tasks</h2>
                    <div id="addTaskSection" class="function-placeholder" style="background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 1.5rem; width: 100%; box-sizing: border-box; text-align: left;">
                        <h3>Add New Task (Status: To Do)</h3>
                        <form id="addTaskForm" style="display: flex; flex-direction: column; gap: 1rem;">
                            <div>
                                <label for="newTaskName">Task Name: (Required)</label>
                                <input type="text" id="newTaskName" required style="width: 100%; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                            </div>
                            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                                <div style="flex: 1; min-width: 150px;">
                                    <label for="newTaskDueDate">Due Date:</label>
                                    <input type="date" id="newTaskDueDate" style="width: 100%; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                                </div>
                            </div>
                             <div>
                                <label for="newTaskAssignee">Assign To: (Team Member)</label>
                                <select id="newTaskAssignee" style="width: 100%; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                                    <option value="">-- Unassigned --</option>
                                </select>
                            </div>
                            <button type="submit" style="align-self: flex-start; padding: 0.6rem 1.2rem; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">Add Task</button>
                        </form>
                        <div id="addTaskMessage" class="message"></div>
                    </div>
                    
                    <div class="function-placeholder" style="padding: 0; border: none; background: none; margin-top: 1rem;">
                        <table id="listTaskTable">
                            <thead>
                                <tr>
                                    <th>Task Name</th>
                                    <th>Assigned To</th>
                                    <th>Status</th>
                                    <th>Due Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="listTaskTbody">
                                </tbody>
                        </table>
                        <div id="listTaskMessage" class="message"></div>
                    </div>
                </div>

            </div> </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        let currentProjectId = null;
        let currentUser = null;
        
        // (Helper functions - เหมือนเดิม)
        function formatLocalDate(dateString) { /* ... */ }
        function getProjectIdFromUrl() { /* ... */ }
        async function loadProjectInfo(projectId) { /* ... */ }
        async function loadAllEmployeesDropdown() { /* ... */ }
        async function loadProjectMembers(projectId) { /* ... */ }
        function setupAddForm(projectId) { /* ... */ }
        async function removeMember(projectMemberId, name) { /* ... */ }
        
        // --- (*** 6. (แก้ไข!) ฟังก์ชันสำหรับ "จัดการงาน" ***) ---
        
        // 6.1 โหลด "Dropdown ลูกทีม" (เหมือนเดิม)
        function loadProjectMembersDropdown(members) {
            const select = document.getElementById('newTaskAssignee');
            if (!select) return;
            select.innerHTML = '<option value="">-- Unassigned --</option>';
            members.forEach(member => {
                const option = new Option(member.fullName, member.employeeId);
                select.appendChild(option);
            });
        }
        
        // 6.2 โหลด "ตารางงาน" (เหมือนเดิม)
        async function loadProjectTasks(projectId) { /* ... (โค้ดเหมือนเดิม) ... */
             const tbody = document.getElementById('listTaskTbody');
            const messageDiv = document.getElementById('listTaskMessage');
            if (!tbody || !messageDiv) return;
            tbody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';
            showMessage('listTaskMessage', '');
            try {
                const response = await fetch(`${API_BASE_URL}/project-tasks/${projectId}`, { method: 'GET' });
                if (!response.ok) throw new Error(`Failed to fetch: ${response.status}`);
                const tasks = await response.json();
                tbody.innerHTML = ''; 
                if (tasks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">No tasks found for this project.</td></tr>';
                    return;
                }
                tasks.forEach(item => {
                    const tr = document.createElement('tr');
                    const safeName = item.taskName.replace(/'/g, "\\'");
                    tr.innerHTML = `
                        <td>${item.taskName}</td>
                        <td>${item.assignedToEmployeeName}</td>
                        <td>${item.status}</td>
                        <td>${formatLocalDate(item.dueDate)}</td>
                        <td class="actions-cell">
                            <button class="btn-delete" onclick="deleteTask(${item.taskId}, '${safeName}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Load Tasks Error:', error);
                showMessage('listTaskMessage', error.message);
                tbody.innerHTML = `<tr><td colspan="5" style="color: red;">Error loading data.</td></tr>`;
            }
        }
        
        // 6.3 ฟังก์ชัน "Add Task" (*** แก้ไข: ลบ 'status' ออกจาก writeModel ***)
        function setupAddTaskForm(projectId) {
            const addForm = document.getElementById('addTaskForm');
            if (!addForm) return;

            addForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                showMessage('addTaskMessage', 'Adding task...');
                
                const writeModel = {
                    projectId: projectId,
                    taskName: document.getElementById('newTaskName').value,
                    // (*** ลบ Status ออกไปแล้ว ***)
                    dueDate: document.getElementById('newTaskDueDate').value || null,
                    assignedToEmployeeId: document.getElementById('newTaskAssignee').value || null
                };

                try {
                    const response = await fetch(`${API_BASE_URL}/project-tasks`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(writeModel)
                    });
                    if (!response.ok) {
                        let errorMessage = `Error: ${response.status}`;
                        try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                        throw new Error(errorMessage);
                    }
                    showMessage('addTaskMessage', `Task '${writeModel.taskName}' created (To Do).`, true);
                    addForm.reset();
                    loadProjectTasks(projectId); 
                } catch (error) {
                    console.error('Add Task Error:', error);
                    showMessage('addTaskMessage', error.message);
                }
            });
        }

        // 6.4 ฟังก์ชัน "Delete Task" (เหมือนเดิม)
        async function deleteTask(taskId, name) { /* ... (โค้ดเหมือนเดิม) ... */
            if (!confirm(`Are you sure you want to delete task: ${name}?`)) { return; }
            showMessage('listTaskMessage', `Deleting ${name}...`);
            try {
                const response = await fetch(`${API_BASE_URL}/project-tasks/${taskId}`, { method: 'DELETE' });
                if (!response.ok) { throw new Error("Delete failed"); }
                showMessage('listTaskMessage', `Task '${name}' deleted.`, true);
                loadProjectTasks(currentProjectId); 
            } catch (error) {
                console.error('Delete Task Error:', error);
                showMessage('listTaskMessage', error.message);
            }
        }
        
        // --- (7. รันฟังก์ชันเมื่อหน้าเว็บโหลด (เหมือนเดิม) ---
        document.addEventListener('DOMContentLoaded', async () => {
            currentProjectId = getProjectIdFromUrl(); 
            currentUser = checkAuthAndLoadUserInfo();

            if (!currentUser || !currentProjectId) {
                alert("You must be logged in and provide a projectId.");
                window.location.href = 'index.html'; 
                return;
            }

            const project = await loadProjectInfo(currentProjectId);
            
            const isPMAssigned = (project && project.projectManagerEmployeeId === currentUser.employeeId);
            const isAdminOrHR = (currentUser.role === 'Admin' || currentUser.role === 'HR');

            if (isPMAssigned || isAdminOrHR) {
                if (isAdminOrHR) {
                    document.getElementById('backLink').href = 'manage_projects.html';
                } else {
                    document.getElementById('backLink').href = 'my_projects.html';
                }

                loadAllEmployeesDropdown();
                loadProjectMembers(currentProjectId); 
                setupAddForm(currentProjectId);
                loadProjectTasks(currentProjectId);
                setupAddTaskForm(currentProjectId);
            } else {
                alert("You are not the Project Manager for this project.");
                window.location.href = 'index.html'; 
            }
        });
        
        // (*** ผมย่อโค้ดที่ "เหมือนเดิม" ให้เป็น Comment นะครับ ***)
        function formatLocalDate(dateString) { if (!dateString) return 'N/A'; try { const date = new Date(dateString); return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Bangkok' }); } catch (e) { return 'N/A'; } }
        function getProjectIdFromUrl() { try { const urlParams = new URLSearchParams(window.location.search); const id = urlParams.get('projectId'); if (!id) throw new Error("No projectId in URL"); return parseInt(id); } catch (e) { console.error(e); return null; } }
        async function loadProjectInfo(projectId) { const container = document.getElementById('projectInfoContainer'); if (!container) return null; try { const response = await fetch(`${API_BASE_URL}/projects/${projectId}`, { method: 'GET' }); if (!response.ok) throw new Error('Failed to load project info'); const p = await response.json(); container.innerHTML = `<h2>${p.projectName}</h2><p><strong>Status:</strong> ${p.status}</p><p><strong>PM ID:</strong> ${p.projectManagerEmployeeId || 'N/A'}</p><p><strong>Description:</strong> ${p.projectDescription || 'N/A'}</p>`; return p; } catch (error) { console.error(error); container.innerHTML = `<p style="color: red;">Error loading project info.</p>`; return null; } }
        async function loadAllEmployeesDropdown() { const select = document.getElementById('newMember'); if (!select) return; try { const response = await fetch(`${API_BASE_URL}/employees/all-basic`, { method: 'GET' }); if (!response.ok) throw new Error('Failed to load employees'); const employees = await response.json(); select.innerHTML = '<option value="">-- Select Employee --</option>';  employees.forEach(emp => { const option = new Option(`${emp.fullName} (${emp.employeeNumber})`, emp.employeeId); select.appendChild(option); }); } catch (error) { console.error(error); select.innerHTML = '<option value="">Error loading</option>'; } }
        async function loadProjectMembers(projectId) { const tbody = document.getElementById('listTbody'); const messageDiv = document.getElementById('listMessage'); if (!tbody || !messageDiv) return; tbody.innerHTML = '<tr><td colspan="3">Loading...</td></tr>'; showMessage('listMessage', ''); try { const response = await fetch(`${API_BASE_URL}/project-members/${projectId}`, { method: 'GET' }); if (!response.ok) throw new Error(`Failed to fetch: ${response.status}`); const members = await response.json(); tbody.innerHTML = '';  if (members.length === 0) { tbody.innerHTML = '<tr><td colspan="3">No members assigned to this project.</td></tr>'; } members.forEach(item => { const tr = document.createElement('tr'); const safeName = item.fullName.replace(/'/g, "\\'"); tr.innerHTML = `<td>${item.fullName}</td><td>${item.jobTitle || 'N/A'}</td><td class="actions-cell"><button class="btn-delete" onclick="removeMember(${item.projectMemberId}, '${safeName}')">Remove</button></td>`; tbody.appendChild(tr); }); loadProjectMembersDropdown(members);  } catch (error) { console.error('Load Members Error:', error); tbody.innerHTML = `<tr><td colspan="3" style="color: red;">Error loading data.</td></tr>`; } }
        function setupAddForm(projectId) { const addForm = document.getElementById('addForm'); if (!addForm) return; addForm.addEventListener('submit', async (event) => { event.preventDefault(); showMessage('addMessage', 'Adding member...'); const writeModel = { projectId: projectId, employeeId: parseInt(document.getElementById('newMember').value) }; if (!writeModel.employeeId) { showMessage('addMessage', 'Please select an employee.'); return; } try { const response = await fetch(`${API_BASE_URL}/project-members`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(writeModel) }); if (!response.ok) { let errorMessage = `Error: ${response.status}`; try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {} throw new Error(errorMessage); } const created = await response.json(); showMessage('addMessage', `Member '${created.fullName}' added successfully.`, true); addForm.reset(); loadProjectMembers(projectId);  } catch (error) { console.error('Add Member Error:', error); showMessage('addMessage', error.message); } }); }
        async function removeMember(projectMemberId, name) { if (!confirm(`Are you sure you want to remove ${name} from this project?`)) { return; } showMessage('listMessage', `Removing ${name}...`); try { const response = await fetch(`${API_BASE_URL}/project-members/${projectMemberId}`, { method: 'DELETE' }); if (!response.ok) { let errorMessage = `Error: ${response.status}`; try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {} throw new Error(errorMessage); } showMessage('listMessage', `Member '${name}' removed.`, true); loadProjectMembers(currentProjectId);  } catch (error) { console.error('Remove Member Error:', error); showMessage('listMessage', error.message); } }
    </script>
</body>
</html>
