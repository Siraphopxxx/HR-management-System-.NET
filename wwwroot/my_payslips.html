<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Payslips</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css"> </head>
<body>
    <div id="app" class="role-page employee-page"> 
        <header>
            <h1>My Payslip History</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>
        <main>
            <a href="employee.html" class="back-link">&larr; Back to Dashboard</a>

            <h2>My Payslips (Newest first)</h2>
            <div class="function-placeholder" style="padding: 0; border: none; background: none;">
                <table id="listTable">
                    <thead>
                        <tr>
                            <th>Pay Period</th>
                            <th>Net Salary (THB)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="listTbody">
                        </tbody>
                </table>
                <div id="listMessage" class="message"></div>
            </div>

        </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        let currentEmployeeId = null;

        // (Helper: แปลง Date)
        function formatPayPeriod(dateString) {
            if (!dateString) return 'N/A';
            try {
                // (เราจะโชว์แค่ "เดือน" กับ "ปี")
                const date = new Date(dateString);
                return date.toLocaleDateString('th-TH', {
                    year: 'numeric', month: 'long', timeZone: 'Asia/Bangkok'
                });
            } catch (e) { return 'N/A'; }
        }

        // 1. ฟังก์ชันโหลด "ประวัติสลิป"
        async function loadMyPayslipHistory(employeeId) {
            if (!employeeId) return;
            
            const tbody = document.getElementById('listTbody');
            const messageDiv = document.getElementById('listMessage');
            if (!tbody || !messageDiv) return;

            tbody.innerHTML = '<tr><td colspan="3">Loading history...</td></tr>';
            showMessage('listMessage', '');

            try {
                // (เรียก API ใหม่: "api/my-payslips/{employeeId}")
                const response = await fetch(`${API_BASE_URL}/my-payslips/${employeeId}`, { method: 'GET' });
                if (!response.ok) throw new Error(`Failed to fetch history: ${response.status}`);

                const history = await response.json();
                tbody.innerHTML = ''; 

                if (history.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3">No payslip history found.</td></tr>';
                    return;
                }

                history.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${formatPayPeriod(item.payDate)}</td>
                        <td>${item.netSalary.toLocaleString()}</td>
                        <td class="actions-cell">
                            <button class="btn-edit" style="background-color: #007bff;" onclick="viewDetail(${item.payslipId})">View Detail</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error('Load History Error:', error);
                showMessage('listMessage', error.message);
                tbody.innerHTML = `<tr><td colspan="3" style="color: red;">Error loading history.</td></tr>`;
            }
        }
        
        // 2. ฟังก์ชัน "ดู Detail"
        function viewDetail(payslipId) {
            // (ส่ง payslipId ไปที่หน้าใหม่ทาง URL)
            window.location.href = `payslip_detail.html?payslipId=${payslipId}`;
        }

        // --- รันฟังก์ชันเมื่อหน้าเว็บโหลด ---
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = checkAuthAndLoadUserInfo();
            if (currentUser && currentUser.employeeId) {
                currentEmployeeId = currentUser.employeeId;
                loadMyPayslipHistory(currentEmployeeId); 
            } else {
                alert("You do not have permission to view this page.");
                window.location.href = 'index.html'; 
            }
        });
    </script>
</body>
</html>
