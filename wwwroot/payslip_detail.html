<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payslip Detail</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css"> <style>
        /* (*** CSS สำหรับ "วาด" สลิป ***) */
        main {
            max-width: 800px; /* (บีบให้เหมือนกระดาษ) */
            margin: auto;
        }
        .payslip-container {
            border: 1px solid #ccc;
            background-color: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .payslip-header {
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        .payslip-header h2 {
            margin: 0;
            color: #333;
        }
        .employee-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .employee-info div {
            font-size: 0.95rem;
        }
        .employee-info strong {
            display: block;
            color: #555;
            margin-bottom: 0.25rem;
        }
        .payslip-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .payslip-section h3 {
            margin-top: 0;
            border-bottom: 1px solid #ddd;
            padding-bottom: 0.5rem;
            color: #444;
        }
        .payslip-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .payslip-total {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.1rem;
            border-top: 2px solid #333;
            padding-top: 0.5rem;
            margin-top: 1rem;
        }
        .payslip-footer {
            margin-top: 2rem;
            border-top: 2px solid #eee;
            padding-top: 1.5rem;
            text-align: center;
        }
        .payslip-footer h3 {
            margin: 0;
            font-size: 1.5rem;
            color: #28a745;
        }
    </style>
</head>
<body>
    <div id="app" class="role-page employee-page"> 
        <header>
            <h1>Payslip Detail</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>
        <main>
            <a href="my_payslips.html" class="back-link">&larr; Back to History</a>

            <div id="payslipContainer" class="payslip-container">
                <p>Loading payslip detail...</p>
            </div>

        </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        let currentEmployeeId = null;
        let currentPayslipId = null;

        // (Helper: ดึง Query String จาก URL)
        function getPayslipIdFromUrl() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const id = urlParams.get('payslipId');
                if (!id) {
                    throw new Error("No payslipId in URL");
                }
                return parseInt(id);
            } catch (e) {
                console.error(e);
                return null;
            }
        }
        
        // (Helper: แปลง Date)
        function formatFullDate(dateString) {
            if (!dateString) return 'N/A';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('th-TH', {
                    year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Bangkok'
                });
            } catch (e) { return 'N/A'; }
        }

        // 1. ฟังก์ชันโหลด "สลิป (ฉบับเต็ม)"
        async function loadPayslipDetail(payslipId, employeeId) {
            const container = document.getElementById('payslipContainer');
            if (!container) return;

            try {
                // (เรียก API ใหม่: "api/my-payslips/detail/{payslipId}/{employeeId}")
                const response = await fetch(`${API_BASE_URL}/my-payslips/detail/${payslipId}/${employeeId}`, { method: 'GET' });
                
                if (!response.ok) {
                    let errorMessage = "Error loading payslip.";
                    if (response.status === 404) errorMessage = "Payslip not found or you do not have permission to view it.";
                    throw new Error(errorMessage);
                }

                const slip = await response.json();
                
                // (*** เริ่ม "วาด" สลิป ***)
                
                // (วาด "รายการรับ")
                let incomeHtml = '';
                slip.incomeItems.forEach(item => {
                    incomeHtml += `
                        <div class="payslip-item">
                            <span>${item.description}</span>
                            <span>${item.amount.toLocaleString()}</span>
                        </div>
                    `;
                });
                
                // (วาด "รายการหัก")
                let deductionHtml = '';
                slip.deductionItems.forEach(item => {
                    deductionHtml += `
                        <div class="payslip-item">
                            <span>${item.description}</span>
                            <span>(${item.amount.toLocaleString()})</span> </div>
                    `;
                });

                // (วาด "สลิปทั้งใบ")
                container.innerHTML = `
                    <div class="payslip-header">
                        <h2>Payslip</h2>
                        <p>For the Pay Period ending ${formatFullDate(slip.payDate)}</p>
                    </div>
                    
                    <div class="employee-info">
                        <div>
                            <strong>Employee:</strong>
                            ${slip.employeeName}
                        </div>
                         <div>
                            <strong>Employee ID:</strong>
                            ${slip.employeeNumber}
                        </div>
                         <div>
                            <strong>Department:</strong>
                            ${slip.departmentName}
                        </div>
                        <div>
                            <strong>Pay Date:</strong>
                            ${formatFullDate(slip.payDate)}
                        </div>
                    </div>
                    
                    <div class="payslip-body">
                        <div class="payslip-section" id="incomeSection">
                            <h3>Earnings</h3>
                            ${incomeHtml}
                            <div class="payslip-total">
                                <span>Total Earnings:</span>
                                <span>${slip.totalIncome.toLocaleString()}</span>
                            </div>
                        </div>
                        
                        <div class="payslip-section" id="deductionSection">
                            <h3>Deductions</h3>
                            ${deductionHtml}
                            <div class="payslip-total">
                                <span>Total Deductions:</span>
                                <span>(${slip.totalDeductions.toLocaleString()})</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="payslip-footer">
                        <small>NET SALARY (THB)</small>
                        <h3>${slip.netSalary.toLocaleString()}</h3>
                    </div>
                `;

            } catch (error) {
                console.error('Load Payslip Error:', error);
                container.innerHTML = `<p style="color: red;">${error.message}</p>`;
            }
        }

        // --- รันฟังก์ชันเมื่อหน้าเว็บโหลด ---
        document.addEventListener('DOMContentLoaded', () => {
            currentPayslipId = getPayslipIdFromUrl(); // (ดึง ID สลิป จาก URL)
            const currentUser = checkAuthAndLoadUserInfo();
            
            if (currentUser && currentUser.employeeId && currentPayslipId) {
                currentEmployeeId = currentUser.employeeId;
                
                // (*** ยิง API ***)
                loadPayslipDetail(currentPayslipId, currentEmployeeId); 
            } else {
                alert("You do not have permission or payslip ID is missing.");
                window.location.href = 'index.html'; 
            }
        });
    </script>
</body>
</html>
