<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="style.css"> 
    
    <style>
        #announcementWidget {
            background-color: #fffaf0; border: 1px solid #ffeeba; border-radius: 8px;
            padding: 1.5rem; margin-bottom: 2rem;
        }
        #announcementWidget h2 { margin-top: 0; color: #856404; }
        .announcement-item {
            border-bottom: 1px solid #eee; padding: 1rem 0;
        }
        .announcement-item:last-child { border-bottom: none; padding-bottom: 0; }
        .announcement-item h4 { margin: 0 0 0.5rem 0; color: #333; }
        .announcement-item small { color: #777; font-style: italic; }
        .announcement-item p { margin: 0.5rem 0 0 0; white-space: pre-wrap; }
        
        #announcementList {
            max-height: 120px; 
            overflow-y: auto;  
            padding-right: 1rem; 
            border-top: 1px solid #ffeeba;
            border-bottom: 1px solid #ffeeba;
        }
    </style>
</head>
<body>
    <div id="app" class="role-page manager-page">
         <header>
            <h1>Manager Dashboard</h1>
            <div id="userInfoDisplay">Loading user info...</div>
         </header>
        <main>

            <div id="announcementWidget">
                <h2>Company Announcements</h2>
                <div id="announcementList">
                    <p>Loading announcements...</p>
                </div>
            </div>

            <h2>Manager Functions</h2>
            <div class="function-placeholder">
                 <button onclick="window.location.href='approve_leave.html'">Approve Leave Requests</button> 
                 <button onclick="window.location.href='view_team.html'">View Team Information</button> 
                 
                 <button onclick="window.location.href='my_projects.html'" style="background-color: #6f42c1; color: white;">Manage My Projects</button>
            </div>
        </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        // (JavaScript ของ manager.html - เหมือนเดิม)
        function formatLocalDate(dateString, withTime = false) { /* ... */ }
        async function loadAnnouncements() { /* ... */ }
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = checkAuthAndLoadUserInfo(); 
            if (currentUser) {
                console.log(`Manager user ${currentUser.name} loaded.`);
                loadAnnouncements();
            }
        });

        // (*** ผมจะก๊อบปี้โค้ด JS แบบย่อมาให้ ... คุณใช้โค้ดเดิมของคุณได้เลย ***)
        function formatLocalDate(dateString, withTime = false) {
            try {
                const date = new Date(dateString);
                const options = { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Bangkok' };
                if (withTime) { options.hour = '2-digit'; options.minute = '2-digit'; }
                return date.toLocaleString('th-TH', options);
            } catch (e) { return dateString; }
        }
        async function loadAnnouncements() {
            const container = document.getElementById('announcementList');
            if (!container) return;
            try {
                const response = await fetch(`${API_BASE_URL}/Announcements`, { method: 'GET' });
                if (!response.ok) throw new Error(`Failed to fetch announcements: ${response.status}`);
                const announcements = await response.json();
                container.innerHTML = ''; 
                if (announcements.length === 0) {
                    container.innerHTML = '<p>No announcements at this time.</p>';
                    return;
                }
                announcements.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'announcement-item';
                    div.innerHTML = `<h4>${item.title}</h4><small>Posted on: ${formatLocalDate(item.postedDate, true)}</small><p>${item.content}</p>`;
                    container.appendChild(div);
                });
            } catch (error) {
                console.error('Load Announcements Error:', error);
                container.innerHTML = '<p style="color: red;">Error loading announcements.</p>';
            }
        }
    </script>
</body>
</html>
