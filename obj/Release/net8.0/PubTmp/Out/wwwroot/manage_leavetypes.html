<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Leave Types</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css"> 
</head>
<body>
    <div id="app" class="role-page admin-page"> 
        <header>
            <h1>Manage Leave Types</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>
        <main>
<a href="#" id="backLink" class="back-link">&larr; Back to Dashboard</a>
            <div id="addSection" class="function-placeholder" style="background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 1.5rem; width: 100%; box-sizing: border-box; text-align: left;">
                <h3>Add New Leave Type</h3>
                <form id="addForm" style="display: flex; flex-wrap: wrap; gap: 1rem;">
                    <div>
                        <label for="newName" style="width: 150px; margin-right: 15px;">Leave Type Name:</label>
                        <input type="text" id="newName" required style="min-width: 200px; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                    </div>
                    <div>
                        <label for="newDesc" style="width: 150px; margin-right: 15px;">Description (Opt.):</label>
                        <input type="text" id="newDesc" style="min-width: 200px; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                    </div>
                    <div>
                        <label for="newIsPaid" style="width: 150px; margin-right: 15px;">Type:</label>
                        <select id="newIsPaid" style="min-width: 200px; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                            <option value="true" selected>Paid</option>
                            <option value="false">Unpaid</option>
                        </select>
                    </div>
                    <button type="submit" style="margin-left: 165px; margin-top: 1rem; padding: 0.6rem 1.2rem; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">Add Leave Type</button>
                </form>
                <div id="addMessage" class="message"></div>
            </div>

            <hr style="margin: 2rem 0;">

            <h2>Leave Type List</h2>
            <div class="function-placeholder" style="padding: 0; border: none; background: none;">
                <table id="listTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Type</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="listTbody">
                        </tbody>
                </table>
                <div id="listMessage" class="message"></div>
            </div>

        </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        // --- โค้ดสำหรับหน้านี้โดยเฉพาะ ---
        // (API_BASE_URL มาจาก script-rolepages.js)

        // 1. ฟังก์ชันโหลด Leave Types
        async function loadLeaveTypes() {
            const tbody = document.getElementById('listTbody');
            const messageDiv = document.getElementById('listMessage');
            if (!tbody || !messageDiv) return;

            tbody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';
            showMessage('listMessage', '');

            try {
                const response = await fetch(`${API_BASE_URL}/LeaveTypes`, { method: 'GET' });
                if (!response.ok) throw new Error(`Failed to fetch leave types: ${response.status}`);

                const leaveTypes = await response.json();
                tbody.innerHTML = ''; 

                if (leaveTypes.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">No leave types found.</td></tr>';
                    return;
                }

                leaveTypes.forEach(lt => {
                    const tr = document.createElement('tr');
                    const isPaidText = lt.isPaid ? 'Paid' : 'Unpaid';
                    const descriptionText = lt.description || 'N/A';
                    
                    // (JS ต้อง Escape single quotes ในชื่อ)
                    const safeName = lt.leaveTypeName.replace(/'/g, "\\'");
                    const safeDesc = descriptionText.replace(/'/g, "\\'");

                    tr.innerHTML = `
                        <td>${lt.leaveTypeId}</td>
                        <td>${lt.leaveTypeName}</td>
                        <td>${descriptionText}</td>
                        <td>${isPaidText}</td>
                        <td class="actions-cell">
                            <button class="btn-edit" onclick="editLeaveType(${lt.leaveTypeId}, '${safeName}', '${safeDesc}', ${lt.isPaid})">Edit</button>
                            <button class="btn-delete" onclick="deleteLeaveType(${lt.leaveTypeId}, '${safeName}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error('Load Leave Types Error:', error);
                showMessage('listMessage', error.message);
                tbody.innerHTML = `<tr><td colspan="5" style="color: red;">Error loading leave types.</td></tr>`;
            }
        }

        // 2. ฟังก์ชัน Add Leave Type
        function setupAddForm() {
            const addForm = document.getElementById('addForm');
            if (!addForm) return;

            addForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                showMessage('addMessage', 'Adding leave type...');
                
                const writeModel = {
                    leaveTypeName: document.getElementById('newName').value,
                    description: document.getElementById('newDesc').value || null,
                    isPaid: document.getElementById('newIsPaid').value === 'true'
                };

                try {
                    const response = await fetch(`${API_BASE_URL}/LeaveTypes`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(writeModel)
                    });

                    if (!response.ok) {
                        let errorMessage = `Error: ${response.status}`;
                        try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                        throw new Error(errorMessage);
                    }

                    const created = await response.json();
                    showMessage('addMessage', `Leave Type '${created.leaveTypeName}' added successfully.`, true);
                    addForm.reset();
                    loadLeaveTypes(); // โหลดตารางใหม่
                } catch (error) {
                    console.error('Add Leave Type Error:', error);
                    showMessage('addMessage', error.message);
                }
            });
        }

        // 3. ฟังก์ชัน Delete Leave Type
        async function deleteLeaveType(id, name) {
            if (!confirm(`Are you sure you want to delete: ${name} (ID: ${id})?`)) {
                return;
            }
            
            showMessage('listMessage', `Deleting ${id}...`);

            try {
                const response = await fetch(`${API_BASE_URL}/LeaveTypes/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    let errorMessage = `Error: ${response.status}`;
                    try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                    throw new Error(errorMessage);
                }

                showMessage('listMessage', `Leave Type ${name} (ID: ${id}) deleted successfully.`, true);
                loadLeaveTypes(); // โหลดตารางใหม่

            } catch (error) {
                console.error('Delete Leave Type Error:', error);
                showMessage('listMessage', error.message);
            }
        }

        // 4. ฟังก์ชัน Edit Leave Type (แบบ Prompt ง่ายๆ)
        async function editLeaveType(id, oldName, oldDesc, oldIsPaid) {
            const newName = prompt("Enter new name:", oldName);
            if (!newName || newName.trim() === "") return; // ถ้ากด Cancel
            
            const newDesc = prompt("Enter new description:", oldDesc === 'N/A' ? '' : oldDesc);
            const newIsPaidInput = prompt("Is this paid leave? (true/false):", oldIsPaid);
            const newIsPaid = newIsPaidInput.toLowerCase() === 'true';

            const writeModel = {
                leaveTypeName: newName,
                description: newDesc || null,
                isPaid: newIsPaid
            };
                
            showMessage('listMessage', `Updating ${id}...`);
            
            try {
                const response = await fetch(`${API_BASE_URL}/LeaveTypes/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(writeModel)
                });

                if (!response.ok) {
                    let errorMessage = `Error: ${response.status}`;
                    try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                    throw new Error(errorMessage);
                }
                
                showMessage('listMessage', `Leave Type ${id} updated to '${newName}'.`, true);
                loadLeaveTypes(); // โหลดตารางใหม่
                
            } catch (error) {
                 console.error('Update Leave Type Error:', error);
                 showMessage('listMessage', error.message);
            }
        }

        // --- รันฟังก์ชันเมื่อหน้าเว็บโหลด ---
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = checkAuthAndLoadUserInfo();
            if (currentUser) {
                if (currentUser.role === 'Admin'|| currentUser.role === 'HR') {
                    if (currentUser.role === 'Admin') {
                        document.getElementById('backLink').href = 'admin.html';
                    } else {
                        document.getElementById('backLink').href = 'hr.html';
                    }
                    setupAddForm();
                    loadLeaveTypes();
                } else {
                    alert("You do not have permission to view this page.");
                    window.location.href = 'index.html'; 
                }
            }
        });
    </script>
</body>
</html>
