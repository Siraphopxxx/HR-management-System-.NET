<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css"> </head>
<body>
    <div id="app" class="role-page employee-page"> 
        <header>
            <h1>My Assigned Tasks</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>
        <main>
            <a href="employee.html" class="back-link">&larr; Back to Dashboard</a>

            <h2>My Task List</h2>
            <div class="function-placeholder" style="padding: 0; border: none; background: none;">
                <table id="listTable">
                    <thead>
                        <tr>
                            <th>Project</th>
                            <th>Task Name</th>
                            <th>Due Date</th>
                            <th>Status</th>
                            <th>Actions</th> </tr>
                    </thead>
                    <tbody id="listTbody">
                        </tbody>
                </table>
                <div id="listMessage" class="message"></div>
            </div>

        </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        let currentEmployeeId = null;

        // (Helper function: แปลง Date string)
        function formatLocalDate(dateString) {
            if (!dateString) return 'N/A';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('th-TH', {
                    year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Bangkok'
                });
            } catch (e) { return 'N/A'; }
        }

        // 1. ฟังก์ชันโหลด "งานของฉัน"
        async function loadMyTasks(employeeId) {
            if (!employeeId) return;
            
            const tbody = document.getElementById('listTbody');
            const messageDiv = document.getElementById('listMessage');
            if (!tbody || !messageDiv) return;

            tbody.innerHTML = '<tr><td colspan="5">Loading my tasks...</td></tr>';
            showMessage('listMessage', '');

            try {
                // (เรียก API ใหม่: "api/my-tasks/{employeeId}")
                const response = await fetch(`${API_BASE_URL}/my-tasks/${employeeId}`, { method: 'GET' });
                if (!response.ok) throw new Error(`Failed to fetch tasks: ${response.status}`);

                const tasks = await response.json();
                tbody.innerHTML = ''; 

                if (tasks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">You have no tasks assigned.</td></tr>';
                    return;
                }

                tasks.forEach(task => {
                    const tr = document.createElement('tr');
                    
                    // (*** สร้างปุ่ม Action ตาม Status ***)
                    let actionButtons = '';
                    const status = task.status.toLowerCase();
                    
                    if (status === 'to do') {
                        actionButtons = `<button class"btn-edit" style="background-color: #007bff;" onclick="updateTaskStatus(${task.taskId}, 'In Progress')">Start Task</button>`;
                    } else if (status === 'in progress') {
                        actionButtons = `<button class"btn-edit" style="background-color: #28a745;" onclick="updateTaskStatus(${task.taskId}, 'Done')">Mark as Done</button>`;
                        // (เผื่ออยากย้อนกลับ)
                        actionButtons += ` <button class"btn-delete" style="background-color: #ffc107; color: #333;" onclick="updateTaskStatus(${task.taskId}, 'To Do')">Back to To Do</button>`;
                    } else { // (Done)
                        actionButtons = `<i>Completed</i>`;
                    }
                    
                    tr.innerHTML = `
                        <td>${task.projectName}</td>
                        <td>${task.taskName}</td>
                        <td>${formatLocalDate(task.dueDate)}</td>
                        <td>${task.status}</td>
                        <td class="actions-cell">${actionButtons}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error('Load My Tasks Error:', error);
                showMessage('listMessage', error.message);
                tbody.innerHTML = `<tr><td colspan="5" style="color: red;">Error loading tasks.</td></tr>`;
            }
        }
        
        // 2. ฟังก์ชัน "อัปเดต" สถานะงาน
        async function updateTaskStatus(taskId, newStatus) {
            if (!currentEmployeeId) return;
            
            // (ถามยืนยัน)
            if (newStatus === 'Done' && !confirm(`Are you sure you want to mark this task as 'Done'?`)) {
                return;
            }
            
            showMessage('listMessage', `Updating task ${taskId} to ${newStatus}...`);

            try {
                const response = await fetch(`${API_BASE_URL}/my-tasks/${taskId}/update-status/${currentEmployeeId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newStatus: newStatus })
                });

                if (!response.ok) {
                    let errorMessage = `Error: ${response.status}`;
                    try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                    throw new Error(errorMessage);
                }
                
                showMessage('listMessage', `Task status updated.`, true);
                
                // (โหลดตารางใหม่)
                loadMyTasks(currentEmployeeId);

            } catch (error) {
                console.error('Update Status Error:', error);
                showMessage('listMessage', error.message);
            }
        }


        // --- รันฟังก์ชันเมื่อหน้าเว็บโหลด ---
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = checkAuthAndLoadUserInfo();
            if (currentUser && currentUser.employeeId) {
                currentEmployeeId = currentUser.employeeId;
                loadMyTasks(currentEmployeeId); 
            } else {
                alert("You do not have permission to view this page.");
                window.location.href = 'index.html'; 
            }
        });
    </script>
</body>
</html>
