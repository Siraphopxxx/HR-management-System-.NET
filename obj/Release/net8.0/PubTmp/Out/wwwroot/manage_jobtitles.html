<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Job Titles</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css"> </head>
<body>
    <div id="app" class="role-page admin-page"> 

        <header>
            <h1>Manage Job Titles</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>

        <main>
            <a href="#" id="backLink" class="back-link">&larr; Back to Dashboard</a>
            <div id="addJobTitleSection" class="function-placeholder" style="background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 1.5rem; width: 100%; box-sizing: border-box; text-align: left;">
                <h3>Add New Job Title</h3>
                <form id="addJobTitleForm">
                    <div>
                        <label for="newJobTitleName" style="width: 150px; margin-right: 15px;">Job Title Name:</label>
                        <input type="text" id="newJobTitleName" required style="flex-grow: 1; min-width: 200px; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                    </div>
                    <button type="submit" style="margin-left: 165px; margin-top: 1rem; padding: 0.6rem 1.2rem; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">Add Job Title</button>
                </form>
                <div id="addJobTitleMessage" class="message"></div>
            </div>

            <hr style="margin: 2rem 0;">

            <h2>Job Title List</h2>
            <div class="function-placeholder" style="padding: 0; border: none; background: none;">
                <table id="jobTitleListTable">
                    <thead>
                        <tr>
                            <th>Job Title ID</th>
                            <th>Job Title Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="jobTitleListTbody">
                        </tbody>
                </table>
                <div id="jobTitleListMessage" class="message"></div>
            </div>

        </main>

    </div>

    <script src="script-rolepages.js"></script>
    <script>
        // --- โค้ดสำหรับหน้านี้โดยเฉพาะ ---
        // (ลบบรรทัด const API_BASE_URL ที่ซ้ำซ้อนออกแล้ว)

        // 1. ฟังก์ชันโหลด Job Titles
        async function loadJobTitles() {
            const tbody = document.getElementById('jobTitleListTbody');
            const messageDiv = document.getElementById('jobTitleListMessage');
            if (!tbody || !messageDiv) return;

            tbody.innerHTML = '<tr><td colspan="3">Loading...</td></tr>';
            showMessage('jobTitleListMessage', '');

            try {
                const response = await fetch(`${API_BASE_URL}/JobTitles`, { method: 'GET' });
                if (!response.ok) throw new Error(`Failed to fetch job titles: ${response.status}`);

                const jobTitles = await response.json();
                tbody.innerHTML = ''; 

                if (jobTitles.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3">No job titles found.</td></tr>';
                    return;
                }

                jobTitles.forEach(job => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${job.jobTitleId}</td>
                        <td>${job.titleName}</td>
                        <td class="actions-cell">
                            <button class="btn-edit" onclick="editJobTitle(${job.jobTitleId}, '${job.titleName}')">Edit</button>
                            <button class="btn-delete" onclick="deleteJobTitle(${job.jobTitleId}, '${job.titleName}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error('Load Job Titles Error:', error);
                showMessage('jobTitleListMessage', error.message);
                tbody.innerHTML = `<tr><td colspan="3" style="color: red;">Error loading job titles.</td></tr>`;
            }
        }

        // 2. ฟังก์ชัน Add Job Title
        function setupAddJobTitleForm() {
            const addForm = document.getElementById('addJobTitleForm');
            const messageDiv = document.getElementById('addJobTitleMessage');
            if (!addForm) return;

            addForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                showMessage('addJobTitleMessage', 'Adding job title...');
                
                const jobTitleName = document.getElementById('newJobTitleName').value;

                try {
                    const response = await fetch(`${API_BASE_URL}/JobTitles`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ titleName: jobTitleName }) // << ส่ง titleName
                    });

                    if (!response.ok) {
                        let errorMessage = `Error: ${response.status}`;
                        try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                        throw new Error(errorMessage);
                    }

                    const createdJobTitle = await response.json();
                    showMessage('addJobTitleMessage', `Job Title '${createdJobTitle.titleName}' added successfully.`, true);
                    addForm.reset();
                    loadJobTitles(); // โหลดตารางใหม่
                } catch (error) {
                    console.error('Add Job Title Error:', error);
                    showMessage('addJobTitleMessage', error.message);
                }
            });
        }

        // 3. ฟังก์ชัน Delete Job Title
        async function deleteJobTitle(id, name) {
            if (!confirm(`Are you sure you want to delete job title: ${name} (ID: ${id})?\n\n(This will fail if any employee is assigned to it.)`)) {
                return;
            }
            
            const messageDiv = document.getElementById('jobTitleListMessage');
            showMessage('jobTitleListMessage', `Deleting job title ${id}...`);

            try {
                const response = await fetch(`${API_BASE_URL}/JobTitles/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    let errorMessage = `Error: ${response.status}`;
                    try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                    throw new Error(errorMessage);
                }

                showMessage('jobTitleListMessage', `Job Title ${name} (ID: ${id}) deleted successfully.`, true);
                loadJobTitles(); // โหลดตารางใหม่

            } catch (error) {
                console.error('Delete Job Title Error:', error);
                showMessage('jobTitleListMessage', error.message);
            }
        }

        // 4. ฟังก์ชัน Edit Job Title (แบบ Prompt ง่ายๆ)
        async function editJobTitle(id, oldName) {
            const newName = prompt("Enter new name for job title:", oldName);

            if (newName && newName.trim() !== "" && newName !== oldName) {
                const messageDiv = document.getElementById('jobTitleListMessage');
                showMessage('jobTitleListMessage', `Updating job title ${id}...`);
                
                try {
                    const response = await fetch(`${API_BASE_URL}/JobTitles/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ titleName: newName }) // << ส่ง titleName
                    });

                    if (!response.ok) {
                        let errorMessage = `Error: ${response.status}`;
                        try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                        throw new Error(errorMessage);
                    }
                    
                    showMessage('jobTitleListMessage', `Job Title ${id} updated to '${newName}'.`, true);
                    loadJobTitles(); // โหลดตารางใหม่
                    
                } catch (error) {
                     console.error('Update Job Title Error:', error);
                     showMessage('jobTitleListMessage', error.message);
                }
            }
        }

        // --- รันฟังก์ชันเมื่อหน้าเว็บโหลด ---
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = checkAuthAndLoadUserInfo();
            if (currentUser) {
                if (currentUser.role === 'Admin'|| currentUser.role === 'HR') {
                    if (currentUser.role === 'Admin') {
                        document.getElementById('backLink').href = 'admin.html';
                    } else {
                        document.getElementById('backLink').href = 'hr.html';
                    }
                    // ทำงานเฉพาะ Admin
                    setupAddJobTitleForm();
                    loadJobTitles();
                } else {
                    // ถ้าไม่ใช่ Admin ให้เด้งกลับ
                    alert("You do not have permission to view this page.");
                    window.location.href = 'index.html'; 
                }
            }
        });
    </script>
</body>
</html>
