<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Team</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css"> </head>
<body>
    <div id="app" class="role-page manager-page"> 
        <header>
            <h1>My Team Information</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>
        <main>
            <a href="manager.html" class="back-link">&larr; Back to Dashboard</a>

            <h2>My Team Members</h2>
            <div class="function-placeholder" style="padding: 0; border: none; background: none;">
                <table id="listTable">
                    <thead>
                        <tr>
                            <th>Employee ID</th>
                            <th>Full Name</th>
                            <th>Job Title</th>
                            <th>Email</th>
                            <th>Phone Number</th>
                        </tr>
                    </thead>
                    <tbody id="listTbody">
                        <tr><td colspan="5">Loading team members...</td></tr>
                    </tbody>
                </table>
                <div id="listMessage" class="message"></div>
            </div>

        </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        // --- โค้ดสำหรับหน้านี้โดยเฉพาะ ---

        // 1. ฟังก์ชันโหลด "รายชื่อลูกน้อง"
        async function loadMyTeam(managerId) {
            if (!managerId) return;
            
            const tbody = document.getElementById('listTbody');
            const messageDiv = document.getElementById('listMessage');
            if (!tbody || !messageDiv) return;

            tbody.innerHTML = '<tr><td colspan="5">Loading team members...</td></tr>';
            showMessage('listMessage', '');

            try {
                // (เรียก API ใหม่ที่เราสร้าง: "api/manager/my-team/{managerId}")
                const response = await fetch(`${API_BASE_URL}/manager/my-team/${managerId}`, { method: 'GET' });
                if (!response.ok) throw new Error(`Failed to fetch team: ${response.status}`);

                const team = await response.json();
                tbody.innerHTML = ''; 

                if (team.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">You have no team members assigned.</td></tr>';
                    return;
                }

                team.forEach(member => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${member.employeeNumber}</td>
                        <td>${member.fullName}</td>
                        <td>${member.jobTitle}</td>
                        <td>${member.email}</td>
                        <td>${member.phoneNumber}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error('Load Team Error:', error);
                showMessage('listMessage', error.message);
                tbody.innerHTML = `<tr><td colspan="5" style="color: red;">Error loading team.</td></tr>`;
            }
        }

        // --- รันฟังก์ชันเมื่อหน้าเว็บโหลด ---
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = checkAuthAndLoadUserInfo();
            if (currentUser) {
                // (เราต้องใช้ EmployeeId ของ Manager ที่ล็อกอิน)
                if (currentUser.role === 'Manager' && currentUser.employeeId) {
                    loadMyTeam(currentUser.employeeId); 
                } else {
                    alert("You do not have permission to view this page.");
                    window.location.href = 'index.html'; 
                }
            }
        });
    </script>
</body>
</html>
