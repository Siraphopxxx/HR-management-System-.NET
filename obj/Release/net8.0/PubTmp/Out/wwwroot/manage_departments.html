<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Departments</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css"> </head>
<body>
    <div id="app" class="role-page admin-page"> <header>
            <h1>Manage Departments</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>
        <main>
<a href="#" id="backLink" class="back-link">&larr; Back to Dashboard</a>
            <div id="addDeptSection" class="function-placeholder" style="background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 1.5rem; width: 100%; box-sizing: border-box; text-align: left;">
                <h3>Add New Department</h3>
                <form id="addDeptForm">
                    <div>
                        <label for="newDeptName" style="width: 150px; margin-right: 15px;">Department Name:</label>
                        <input type="text" id="newDeptName" required style="flex-grow: 1; min-width: 200px; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                    </div>
                    <button type="submit" style="margin-left: 165px; margin-top: 1rem; padding: 0.6rem 1.2rem; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">Add Department</button>
                </form>
                <div id="addDeptMessage" class="message"></div>
            </div>

            <hr style="margin: 2rem 0;">

            <h2>Department List</h2>
            <div class="function-placeholder" style="padding: 0; border: none; background: none;">
                <table id="deptListTable">
                    <thead>
                        <tr>
                            <th>Department ID</th>
                            <th>Department Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="deptListTbody">
                        </tbody>
                </table>
                <div id="deptListMessage" class="message"></div>
            </div>

        </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        // --- โค้ดสำหรับหน้านี้โดยเฉพาะ ---
        // (ลบบรรทัด const API_BASE_URL ที่ซ้ำซ้อนออกแล้ว)

        // 1. ฟังก์ชันโหลด Departments
        async function loadDepartments() {
            const tbody = document.getElementById('deptListTbody');
            const messageDiv = document.getElementById('deptListMessage');
            if (!tbody || !messageDiv) return;

            tbody.innerHTML = '<tr><td colspan="3">Loading...</td></tr>';
            showMessage('deptListMessage', '');

            try {
                const response = await fetch(`${API_BASE_URL}/Departments`, { method: 'GET' });
                if (!response.ok) throw new Error(`Failed to fetch departments: ${response.status}`);

                const departments = await response.json();
                tbody.innerHTML = ''; 

                if (departments.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3">No departments found.</td></tr>';
                    return;
                }

                departments.forEach(dept => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${dept.departmentId}</td>
                        <td>${dept.departmentName}</td>
                        <td class="actions-cell">
                            <button class="btn-edit" onclick="editDepartment(${dept.departmentId}, '${dept.departmentName}')">Edit</button>
                            <button class="btn-delete" onclick="deleteDepartment(${dept.departmentId}, '${dept.departmentName}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error('Load Departments Error:', error);
                showMessage('deptListMessage', error.message);
                tbody.innerHTML = `<tr><td colspan="3" style="color: red;">Error loading departments.</td></tr>`;
            }
        }

        // 2. ฟังก์ชัน Add Department
        function setupAddDeptForm() {
            const addForm = document.getElementById('addDeptForm');
            const messageDiv = document.getElementById('addDeptMessage');
            if (!addForm) return;

            addForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                showMessage('addDeptMessage', 'Adding department...');
                
                const deptName = document.getElementById('newDeptName').value;

                try {
                    const response = await fetch(`${API_BASE_URL}/Departments`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ departmentName: deptName })
                    });

                    if (!response.ok) {
                        let errorMessage = `Error: ${response.status}`;
                        try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                        throw new Error(errorMessage);
                    }

                    const createdDept = await response.json();
                    showMessage('addDeptMessage', `Department '${createdDept.departmentName}' added successfully.`, true);
                    addForm.reset();
                    loadDepartments(); // โหลดตารางใหม่
                } catch (error) {
                    console.error('Add Department Error:', error);
                    showMessage('addDeptMessage', error.message);
                }
            });
        }

        // 3. ฟังก์ชัน Delete Department
        async function deleteDepartment(id, name) {
            if (!confirm(`Are you sure you want to delete department: ${name} (ID: ${id})?\n\n(This will fail if any employee is assigned to it.)`)) {
                return;
            }
            
            const messageDiv = document.getElementById('deptListMessage');
            showMessage('deptListMessage', `Deleting department ${id}...`);

            try {
                const response = await fetch(`${API_BASE_URL}/Departments/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    let errorMessage = `Error: ${response.status}`;
                    try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                    throw new Error(errorMessage);
                }

                showMessage('deptListMessage', `Department ${name} (ID: ${id}) deleted successfully.`, true);
                loadDepartments(); // โหลดตารางใหม่

            } catch (error) {
                console.error('Delete Department Error:', error);
                showMessage('deptListMessage', error.message);
            }
        }

        // 4. ฟังก์ชัน Edit Department (แบบ Prompt ง่ายๆ)
        async function editDepartment(id, oldName) {
            const newName = prompt("Enter new name for department:", oldName);

            if (newName && newName.trim() !== "" && newName !== oldName) {
                const messageDiv = document.getElementById('deptListMessage');
                showMessage('deptListMessage', `Updating department ${id}...`);
                
                try {
                    const response = await fetch(`${API_BASE_URL}/Departments/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ departmentName: newName })
                    });

                    if (!response.ok) {
                        let errorMessage = `Error: ${response.status}`;
                        try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                        throw new Error(errorMessage);
                    }
                    
                    showMessage('deptListMessage', `Department ${id} updated to '${newName}'.`, true);
                    loadDepartments(); // โหลดตารางใหม่
                    
                } catch (error) {
                     console.error('Update Department Error:', error);
                     showMessage('deptListMessage', error.message);
                }
            }
        }

        // --- รันฟังก์ชันเมื่อหน้าเว็บโหลด ---
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = checkAuthAndLoadUserInfo();
            if (currentUser) {
                if (currentUser.role === 'Admin' || currentUser.role === 'HR') {
                    if (currentUser.role === 'Admin') {
                        document.getElementById('backLink').href = 'admin.html';
                    } else {
                        document.getElementById('backLink').href = 'hr.html';
                    }
                    // ทำงานเฉพาะ Admin
                    setupAddDeptForm();
                    loadDepartments();
                } else {
                    // ถ้าไม่ใช่ Admin ให้เด้งกลับ
                    alert("You do not have permission to view this page.");
                    window.location.href = 'index.html'; 
                }
            }
        });
    </script>
</body>
</html>
