<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approve Leave Requests</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css"> </head>
<body>
    <div id="app" class="role-page manager-page"> 
        <header>
            <h1>Approve Leave Requests</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>
        <main>
            <a href="manager.html" class="back-link">&larr; Back to Dashboard</a>

            <h2>Pending Team Requests</h2>
            <div class="function-placeholder" style="padding: 0; border: none; background: none;">
                <table id="listTable">
                    <thead>
                        <tr>
                            <th>Requested By</th>
                            <th>Leave Type</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Reason</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="listTbody">
                        </tbody>
                </table>
                <div id="listMessage" class="message"></div>
            </div>

        </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        // --- โค้ดสำหรับหน้านี้โดยเฉพาะ ---
        let currentManagerEmployeeId = null; // (เก็บ EmployeeId ของ Manager ที่ล็อกอิน)

        // (Helper function: แปลง Date string (YYYY-MM-DD) เป็น Format ที่อ่านง่าย)
        function formatLocalDate(dateString) {
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('th-TH', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    timeZone: 'Asia/Bangkok'
                });
            } catch (e) { return dateString; }
        }

        // 1. ฟังก์ชันโหลด "ใบลาของลูกน้อง"
        async function loadTeamRequests(managerId) {
            if (!managerId) return;
            
            const tbody = document.getElementById('listTbody');
            const messageDiv = document.getElementById('listMessage');
            if (!tbody || !messageDiv) return;

            tbody.innerHTML = '<tr><td colspan="6">Loading team requests...</td></tr>';
            showMessage('listMessage', '');

            try {
                // (เรียก API ที่เราสร้าง: "team-requests/{managerId}")
                const response = await fetch(`${API_BASE_URL}/LeaveRequests/team-requests/${managerId}`, { method: 'GET' });
                if (!response.ok) throw new Error(`Failed to fetch requests: ${response.status}`);

                const requests = await response.json();
                tbody.innerHTML = ''; 

                if (requests.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">No pending requests found.</td></tr>';
                    return;
                }

                requests.forEach(r => {
                    const tr = document.createElement('tr');
                    const reasonText = r.reason || 'N/A';

                    tr.innerHTML = `
                        <td>${r.employeeName}</td>
                        <td>${r.leaveTypeName}</td>
                        <td>${formatLocalDate(r.startDate)}</td>
                        <td>${formatLocalDate(r.endDate)}</td>
                        <td>${reasonText}</td>
                        <td class="actions-cell">
                            <button class="btn-edit" onclick="approveRequest(${r.leaveRequestId})" style="background-color: #28a745;">Approve</button>
                            <button class="btn-delete" onclick="rejectRequest(${r.leaveRequestId})">Reject</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error('Load Team Requests Error:', error);
                showMessage('listMessage', error.message);
                tbody.innerHTML = `<tr><td colspan="6" style="color: red;">Error loading requests.</td></tr>`;
            }
        }

        // 2. ฟังก์ชัน "อนุมัติ"
        async function approveRequest(requestId) {
            if (!confirm(`Are you sure you want to APPROVE this request (ID: ${requestId})?`)) {
                return;
            }
            
            showMessage('listMessage', `Approving ${requestId}...`);

            try {
                const response = await fetch(`${API_BASE_URL}/LeaveRequests/approve/${requestId}?managerId=${currentManagerEmployeeId}`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    let errorMessage = `Error: ${response.status}`;
                    try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                    throw new Error(errorMessage);
                }

                const result = await response.json();
                showMessage('listMessage', result.message, true);
                loadTeamRequests(currentManagerEmployeeId); // โหลดตารางใหม่

            } catch (error) {
                console.error('Approve Request Error:', error);
                showMessage('listMessage', error.message);
            }
        }

        // 3. ฟังก์ชัน "ปฏิเสธ"
        async function rejectRequest(requestId) {
            if (!confirm(`Are you sure you want to REJECT this request (ID: ${requestId})?`)) {
                return;
            }
            
            showMessage('listMessage', `Rejecting ${requestId}...`);

            try {
                const response = await fetch(`${API_BASE_URL}/LeaveRequests/reject/${requestId}?managerId=${currentManagerEmployeeId}`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    let errorMessage = `Error: ${response.status}`;
                    try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                    throw new Error(errorMessage);
                }

                const result = await response.json();
                showMessage('listMessage', result.message, true); // (แม้จะ Reject ก็เป็น Success)
                loadTeamRequests(currentManagerEmployeeId); // โหลดตารางใหม่

            } catch (error) {
                console.error('Reject Request Error:', error);
                showMessage('listMessage', error.message);
            }
        }


        // --- รันฟังก์ชันเมื่อหน้าเว็บโหลด ---
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = checkAuthAndLoadUserInfo();
            if (currentUser) {
                if (currentUser.role === 'Manager') {
                    // (เก็บ EmployeeId ของ Manager ไว้)
                    currentManagerEmployeeId = currentUser.employeeId; 
                    loadTeamRequests(currentManagerEmployeeId); // << โหลดตารางประวัติ
                } else {
                    // (ถ้าไม่ใช่ Manager ก็เด้งออก)
                    alert("You do not have permission to view this page.");
                    window.location.href = 'index.html'; 
                }
            }
        });
    </script>
</body>
</html>
