<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Projects</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="admin.css"> 
</head>
<body>
    <div id="app" class="role-page admin-page"> 
        <header>
            <h1>Manage Projects</h1>
            <div id="userInfoDisplay">Loading user info...</div>
        </header>
        <main>
<a href="#" id="backLink" class="back-link">&larr; Back to Dashboard</a>
            <div id="addSection" class="function-placeholder" style="background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 1.5rem; width: 100%; box-sizing: border-box; text-align: left;">
                <h3>Create New Project</h3>
                <form id="addForm" style="display: flex; flex-direction: column; gap: 1rem;">
                    <div>
                        <label for="newProjectName">Project Name: (Required)</label>
                        <input type="text" id="newProjectName" required style="width: 100%; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                    </div>
                    <div>
                        <label for="newProjectDescription">Description:</label>
                        <textarea id="newProjectDescription" rows="3" style="width: 100%; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;"></textarea>
                    </div>
                    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 200px;">
                            <label for="newStartDate">Start Date:</label>
                            <input type="date" id="newStartDate" style="width: 100%; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                        </div>
                        <div style="flex: 1; min-width: 200px;">
                            <label for="newEndDate">End Date:</label>
                            <input type="date" id="newEndDate" style="width: 100%; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                        </div>
                        <div style="flex: 1; min-width: 200px;">
                            <label for="newStatus">Status: (Required)</label>
                            <select id="newStatus" required style="width: 100%; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                                <option value="Active">Active</option>
                                <option value="On Hold">On Hold</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                        <div style="flex: 1; min-width: 200px;">
                            <label for="newProjectManager">Project Manager: (Opt.)</label>
                            <select id="newProjectManager" style="width: 100%; padding: 0.5rem; border: 1px solid #ced4da; border-radius: 4px;">
                                <option value="">-- No PM Assigned --</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" style="align-self: flex-start; padding: 0.6rem 1.2rem; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">Create Project</button>
                </form>
                <div id="addMessage" class="message"></div>
            </div>

            <hr style="margin: 2rem 0;">

            <h2>Existing Projects</h2>
            <div class="function-placeholder" style="padding: 0; border: none; background: none;">
                <table id="listTable">
                    <thead>
                        <tr>
                            <th>Project Name</th>
                            <th>Status</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="listTbody">
                        </tbody>
                </table>
                <div id="listMessage" class="message"></div>
            </div>

        </main>
    </div>

    <script src="script-rolepages.js"></script>
    <script>
        // (Helper functions - เหมือนเดิม)
        function formatDateForInput(dateString) { /* ... (โค้ดเหมือนเดิม) ... */
            if (!dateString) return '';
            try {
                const date = new Date(dateString);
                return date.toISOString().split('T')[0];
            } catch (e) { return ''; }
        }
        function formatLocalDate(dateString) { /* ... (โค้ดเหมือนเดิม) ... */
            if (!dateString) return 'N/A';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('th-TH', {
                    year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Bangkok'
                });
            } catch (e) { return 'N/A'; }
        }

        // (ฟังก์ชันโหลด Dropdown Manager - เหมือนเดิม)
        async function loadManagersDropdown() { /* ... (โค้ดเหมือนเดิม) ... */
            const select = document.getElementById('newProjectManager');
            if (!select) return;
            try {
                const response = await fetch(`${API_BASE_URL}/users/managers`, { method: 'GET' });
                if (!response.ok) throw new Error('Failed to load managers');
                const managers = await response.json();
                while (select.options.length > 1) { select.remove(1); }
                managers.forEach(mgr => {
                    const option = new Option(`${mgr.fullName} (${mgr.employeeNumber})`, mgr.employeeId);
                    select.appendChild(option);
                });
            } catch (error) { console.error(error); }
        }


        // 1. ฟังก์ชันโหลด Projects (*** แก้ไข: ลบปุ่ม Manage ***)
        async function loadProjects() {
            const tbody = document.getElementById('listTbody');
            const messageDiv = document.getElementById('listMessage');
            if (!tbody || !messageDiv) return;
            tbody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';
            showMessage('listMessage', '');
            try {
                const response = await fetch(`${API_BASE_URL}/projects`, { method: 'GET' });
                if (!response.ok) throw new Error(`Failed to fetch: ${response.status}`);
                const projects = await response.json();
                tbody.innerHTML = ''; 
                if (projects.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">No projects found.</td></tr>';
                    return;
                }
                projects.forEach(item => {
                    const tr = document.createElement('tr');
                    const safeName = item.projectName.replace(/'/g, "\\'");
                    
                    tr.innerHTML = `
                        <td>${item.projectName}</td>
                        <td>${item.status}</td>
                        <td>${formatLocalDate(item.startDate)}</td>
                        <td>${formatLocalDate(item.endDate)}</td>
                        <td class="actions-cell">
                            <button class="btn-edit" onclick="editProject(${item.projectId}, '${safeName}')">Edit</button>
                            <button class="btn-delete" onclick="deleteProject(${item.projectId}, '${safeName}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Load Error:', error);
                tbody.innerHTML = `<tr><td colspan="5" style="color: red;">Error loading data.</td></tr>`;
            }
        }

        // 2. ฟังก์ชัน Add Project (เหมือนเดิม)
        function setupAddForm() { /* ... (โค้ดเหมือนเดิม) ... */
            const addForm = document.getElementById('addForm');
            if (!addForm) return;
            addForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                showMessage('addMessage', 'Creating...');
                const writeModel = {
                    projectName: document.getElementById('newProjectName').value,
                    projectDescription: document.getElementById('newProjectDescription').value || null,
                    startDate: document.getElementById('newStartDate').value || null,
                    endDate: document.getElementById('newEndDate').value || null,
                    status: document.getElementById('newStatus').value,
                    projectManagerEmployeeId: document.getElementById('newProjectManager').value || null
                };
                try {
                    const response = await fetch(`${API_BASE_URL}/projects`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(writeModel)
                    });
                    if (!response.ok) {
                        let errorMessage = `Error: ${response.status}`;
                        try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                        throw new Error(errorMessage);
                    }
                    const created = await response.json();
                    showMessage('addMessage', `Project '${created.projectName}' created successfully.`, true);
                    addForm.reset();
                    loadProjects(); 
                } catch (error) {
                    console.error('Add Error:', error);
                    showMessage('addMessage', error.message);
                }
            });
        }

        // 3. ฟังก์ชัน Delete Project (เหมือนเดิม)
        async function deleteProject(id, name) { /* ... (โค้ดเหมือนเดิม) ... */
            if (!confirm(`Are you sure you want to delete: ${name}?`)) {
                return;
            }
            showMessage('listMessage', `Deleting ${name}...`);
            try {
                const response = await fetch(`${API_BASE_URL}/projects/${id}`, { method: 'DELETE' });
                if (!response.ok) {
                    let errorMessage = `Error: ${response.status}`;
                    try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                    throw new Error(errorMessage);
                }
                showMessage('listMessage', `Project '${name}' deleted.`, true);
                loadProjects(); 
            } catch (error) {
                console.error('Delete Error:', error);
                showMessage('listMessage', error.message);
            }
        }

        // 4. ฟังก์ชัน Edit Project (เหมือนเดิม)
        async function editProject(id, oldName) { /* ... (โค้ดเหมือนเดิม) ... */
            const newName = prompt("Enter new project name:", oldName);
            if (!newName || newName.trim() === "") return; 
            const newStatus = prompt("Enter new status (Active, On Hold, Completed):", "Active");
             if (!newStatus) return;
            const oldDataResponse = await fetch(`${API_BASE_URL}/projects/${id}`);
            const oldData = await oldDataResponse.json();
            const writeModel = {
                projectName: newName,
                projectDescription: oldData.projectDescription, 
                startDate: oldData.startDate, 
                endDate: oldData.endDate, 
                status: newStatus,
                projectManagerEmployeeId: oldData.projectManagerEmployeeId 
            };
            showMessage('listMessage', `Updating ${id}...`);
            try {
                const response = await fetch(`${API_BASE_URL}/projects/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(writeModel)
                });
                if (!response.ok) {
                    let errorMessage = `Error: ${response.status}`;
                    try { const errorData = await response.json(); errorMessage = errorData.message || errorMessage;} catch (e) {}
                    throw new Error(errorMessage);
                }
                showMessage('listMessage', `Project ${id} updated to '${newName}'.`, true);
                loadProjects(); 
            } catch (error) {
                 console.error('Update Error:', error);
                 showMessage('listMessage', error.message);
            }
        }

        // (*** ลบฟังก์ชัน manageProject(projectId) ออกไปแล้ว ***)

        // --- รันฟังก์ชันเมื่อหน้าเว็บโหลด ---
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = checkAuthAndLoadUserInfo();
            if (currentUser && (currentUser.role === 'Admin' || currentUser.role === 'HR')) {
                if (currentUser.role === 'Admin') {
                        document.getElementById('backLink').href = 'admin.html';
                    } else {
                        document.getElementById('backLink').href = 'hr.html';
                    }
                setupAddForm();
                loadProjects();
                loadManagersDropdown(); 
            } else {
                alert("You do not have permission to view this page.");
                window.location.href = 'index.html'; 
            }
        });
    </script>
</body>
</html>
